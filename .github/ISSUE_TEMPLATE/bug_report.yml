name: Bug report
description: Something is wrong with Ralph
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I run `ralph run "..."` ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. ralph run "..."
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Ralph version
      description: Output of `ralph version`
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / arch
      placeholder: linux/amd64, darwin/arm64, windows/amd64
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Re-run with `--log-level debug` and paste relevant output.
      render: text
